[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino

; Serial Monitor settings
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0

; Critical for the camera to use the extra RAM chip
build_flags =
    -D BOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

; Gives you more room for code by shrinking the file system space
board_build.partitions = huge_app.csv